<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
<title>MONTHLY U_PLOG</title>

<!-- React runtime (stable UMD versions) -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- export tools -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<!-- lunar calendar -->
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>

<style>

body{
margin:0;
background:#fafafa;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto
}

.calendar{
max-width:1100px;
margin:auto;
padding:16px
}

.header{
text-align:center;
font-size:26px;
font-weight:700;
margin-bottom:10px
}

.controls{
display:flex;
justify-content:space-between;
margin-bottom:10px
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px
}

.cell{
position:relative;
border:1px solid #ddd;
border-radius:12px;
aspect-ratio:2/3;
background:white;
overflow:hidden;
cursor:pointer
}

.day{
position:absolute;
left:6px;
top:4px;
font-weight:700;
font-size:16px
}

.holiday{
position:absolute;
right:6px;
top:4px;
font-size:12px;
color:#666
}

.photoWrap{
position:absolute;
bottom:6px;
left:6px;
right:6px;
height:calc(66% - 6px);
}

.photoBorder{
width:100%;
height:100%;
box-sizing:border-box;
transition:transform .25s,opacity .25s
}

.photoBorder{
width:100%;
height:100%;
box-sizing:border-box;
transition:transform .25s,opacity .25s
}

.photoBorder img{
width:100%;
height:100%;
object-fit:cover;
border-radius:6px
}

.photoBorder.tear{
transform:scale(.8) rotate(-10deg);
opacity:0
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
display:flex;
justify-content:center;
align-items:center;
z-index:10
}

.cropBox{
background:white;
padding:18px;
border-radius:16px
}

.cropArea{
width:320px;
height:320px;
background:#111;
position:relative;
overflow:hidden;
border-radius:14px;
touch-action:none
}

.cropArea img{
position:absolute;
left:50%;
top:50%;
transform-origin:center;
user-select:none;
pointer-events:none
}

.cropFrame{
position:absolute;
inset:0;
border:3px solid white;
border-radius:12px;
box-shadow:0 0 0 2000px rgba(0,0,0,.45) inset;
pointer-events:none
}

.buttons{
display:flex;
gap:10px;
margin-top:10px
}

button{
padding:8px 14px;
border:none;
border-radius:8px;
background:black;
color:white;
font-size:14px
}

button.secondary{
background:#777
}

</style>
</head>

<body>
<div id="app"></div>

<script type="text/babel">

const {useState,useRef,useEffect}=React

const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]

const months=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
]

/* solar holidays */
const solarFest={
"1-1":"元旦",
"2-14":"情人",
"3-8":"妇女",
"5-1":"劳动",
"6-1":"儿童",
"10-1":"国庆"
}

/* solar terms */
const solarTerms={
"2-4":"立春","3-6":"惊蛰","3-21":"春分",
"4-5":"清明","4-20":"谷雨",
"5-6":"立夏","5-21":"小满",
"6-6":"芒种","6-21":"夏至",
"7-7":"小暑","7-23":"大暑",
"8-8":"立秋","8-23":"处暑",
"9-8":"白露","9-23":"秋分",
"10-8":"寒露","10-23":"霜降",
"11-7":"立冬","11-22":"小雪",
"12-7":"大雪","12-22":"冬至"
}

function getLunarFest(y,m,d){
try{
if(typeof Solar==="undefined")return null
const solar=Solar.fromYmd(y,m+1,d)
const lunar=solar.getLunar()
const md=`${lunar.getMonth()}-${lunar.getDay()}`

const table={
"1-1":"春节",
"1-15":"元宵",
"5-5":"端午",
"7-7":"七夕",
"8-15":"中秋",
"9-9":"重阳"
}

return table[md]||null
}catch(e){return null}
}

function getHoliday(y,m,d){
const lunar=getLunarFest(y,m,d)
if(lunar)return lunar
const key=`${m+1}-${d}`
if(solarFest[key])return solarFest[key]
if(solarTerms[key])return solarTerms[key]
return null
}

function matrix(y,m){
const first=new Date(y,m,1).getDay()
const total=new Date(y,m+1,0).getDate()

const cells=[]
for(let i=0;i<first;i++)cells.push(null)
for(let d=1;d<=total;d++)cells.push(d)
while(cells.length%7)cells.push(null)

const weeks=[]
for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7))

return weeks
}

const macaron=[
"#FFB3BA","#FFDFBA","#FFFFBA",
"#BAFFC9","#BAE1FF","#E3BAFF","#FFD6E7"
]

function App(){

const today=new Date()

const [year,setYear]=useState(today.getFullYear())
const [month,setMonth]=useState(today.getMonth())

const [images,setImages]=useState({})

/* IndexedDB persistence (much larger and safer than localStorage) */
useEffect(()=>{
 const req=indexedDB.open('uplogDB',1)
 req.onupgradeneeded=e=>{
  const db=e.target.result
  if(!db.objectStoreNames.contains('images')){
   db.createObjectStore('images')
  }
 }
 req.onsuccess=e=>{
  const db=e.target.result
  const tx=db.transaction('images','readonly')
  const store=tx.objectStore('images')
  const g=store.get('data')
  g.onsuccess=()=>{
   if(g.result) setImages(g.result)
  }
 }
},[])

useEffect(()=>{
 const req=indexedDB.open('uplogDB',1)
 req.onsuccess=e=>{
  const db=e.target.result
  const tx=db.transaction('images','readwrite')
  const store=tx.objectStore('images')
  store.put(images,'data')
 }
},[images])

const [cropSrc,setCropSrc]=useState(null)
const [cropDay,setCropDay]=useState(null)

const [scale,setScale]=useState(1)
const [pos,setPos]=useState({x:0,y:0})

const lastDist=useRef(null)
const dragStart=useRef(null)

const imgRef=useRef()
const calendarRef=useRef()

function pick(day){
const input=document.createElement("input")
input.type="file"
input.accept="image/*"
input.onchange=e=>{
const file=e.target.files[0]
if(!file)return

const reader=new FileReader()
reader.onload=ev=>{
setCropSrc(ev.target.result)
setCropDay(day)
setScale(1) // temporary, real fit happens on image load
setPos({x:0,y:0})
}
reader.readAsDataURL(file)
}
input.click()
}

function touchStart(e){
if(e.touches.length===1){
 dragStart.current={
  x:e.touches[0].clientX-pos.x,
  y:e.touches[0].clientY-pos.y
 }
}
}

function touchMove(e){

if(e.touches.length===1 && dragStart.current){
setPos({
 x:e.touches[0].clientX-dragStart.current.x,
 y:e.touches[0].clientY-dragStart.current.y
})
}

if(e.touches.length===2){

const dx=e.touches[0].clientX-e.touches[1].clientX
const dy=e.touches[0].clientY-e.touches[1].clientY

const dist=Math.sqrt(dx*dx+dy*dy)

if(lastDist.current){

const ratio=dist/lastDist.current

setScale(s=>{
let next=s*ratio
if(next<0.2)next=0.2
if(next>4)next=4
return next
})

}

lastDist.current=dist

}

}

function touchEnd(){
lastDist.current=null
}

function makeIt(){

if(!imgRef.current)return

const size=512
const canvas=document.createElement("canvas")
canvas.width=size
canvas.height=size
const ctx=canvas.getContext("2d")

const img=imgRef.current

const frame=320
const factor=size/frame
const center=size/2

const drawW=img.naturalWidth*scale*factor
const drawH=img.naturalHeight*scale*factor

ctx.save()
ctx.beginPath()
ctx.rect(0,0,size,size)
ctx.clip()

ctx.translate(center+pos.x*factor,center+pos.y*factor)

ctx.drawImage(
 img,
 -drawW/2,
 -drawH/2,
 drawW,
 drawH
)

ctx.restore()

const url=canvas.toDataURL("image/jpeg",0.82)

const key=`${year}-${month}-${cropDay}`

setImages(prev=>({
...prev,
[key]:{
src:url,
color:macaron[Math.floor(Math.random()*macaron.length)]
}
}))

setCropSrc(null)

}

function cancelCrop(){setCropSrc(null)}

function remove(k){

const el=document.getElementById(k)

if(el){
el.classList.add("tear")

setTimeout(()=>{
setImages(p=>{
const c={...p}
delete c[k]
return c
})
},250)

}

}

async function exportMonth(){

const canvas=await html2canvas(calendarRef.current,{scale:3})

const link=document.createElement("a")
link.download="u_plog.png"
link.href=canvas.toDataURL()
link.click()

}

async function exportYearPDF(){

const {jsPDF}=window.jspdf

const pdf=new jsPDF("p","mm","a4")

for(let m=0;m<12;m++){

setMonth(m)

await new Promise(r=>setTimeout(r,300))

const canvas=await html2canvas(calendarRef.current,{scale:2})

const img=canvas.toDataURL("image/png")

if(m>0)pdf.addPage()

pdf.addImage(img,"PNG",10,10,190,260)

}

pdf.save("u_plog_year.pdf")

}

function changeMonth(dir){

let m=month+dir
let y=year

if(m<0){m=11;y--}
if(m>11){m=0;y++}

setMonth(m)
setYear(y)

}

const weeks=matrix(year,month)

return(

<div className="calendar" ref={calendarRef}>

<div className="controls">

<div style={{fontWeight:"bold",fontSize:18}}>{year}</div>

<div>
<button onClick={()=>changeMonth(-1)}>◀</button>
<button onClick={()=>changeMonth(1)}>▶</button>
<button onClick={exportMonth}>export</button>
<button onClick={exportYearPDF}>year pdf</button>
</div>

</div>

<div className="header">
{months[month]}
</div>

<div className="grid" style={{fontWeight:600,marginBottom:6}}>
{days.map(d=><div key={d}>{d}</div>)}
</div>

{weeks.map((week,i)=>(

<div className="grid" key={i}>

{week.map((d,j)=>{

if(!d)return <div key={j}></div>

const key=`${year}-${month}-${d}`

const img=images[key]

const holiday=getHoliday(year,month,d)

return(

<div className="cell" key={j} onClick={()=>!img && pick(d)}>

<div className="day">{d}</div>

{holiday && <div className="holiday">{holiday}</div>}

{img && (

<div className="photoWrap">

<div
id={key}
className="photoBorder"
style={{border:`4px solid ${img.color}`,borderRadius:"10px"}}
onClick={(e)=>{e.stopPropagation();remove(key)}}
>

<img src={img.src}/>

</div>

</div>

)}

</div>

)

})}

</div>

))}

{cropSrc && (

<div className="modal">

<div className="cropBox">

<div
className="cropArea"
onTouchStart={touchStart}
onTouchMove={touchMove}
onTouchEnd={touchEnd}
>

<img
ref={imgRef}
onLoad={(e)=>{
 const img=e.target
 const frame=320
 const nw=img.naturalWidth
 const nh=img.naturalHeight
 const fit=Math.max(frame/nw,frame/nh)
 setScale(fit)
 setPos({x:0,y:0})
}}
src={cropSrc}
style={{transform:`translate(-50%,-50%) translate(${pos.x}px,${pos.y}px) scale(${scale})`}}
/>

<div className="cropFrame"></div>

</div>

<div style={{marginTop:10}}>

<input
 type="range"
 min="0.2"
 max="4"
 step="0.01"
 value={scale}
 onChange={e=>setScale(Number(e.target.value))}
/>

</div>

<div className="buttons">
<button onClick={makeIt}>make it</button>
<button className="secondary" onClick={cancelCrop}>cancel</button>
</div>

</div>

</div>

)}

</div>

)

}

ReactDOM.render(<App/>,document.getElementById("app"))

</script>

</body>
</html>
