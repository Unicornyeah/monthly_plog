<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mobile Calendar Scrapbook</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{margin:0;background:#ffffff;font-family:"Patrick Hand","Comic Sans MS",system-ui}
button{cursor:pointer}

.calendar{max-width:1200px;margin:auto;padding:20px;background:#f3f3f3;border-radius:16px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}

.cell{position:relative;background:#fff;border-radius:10px;border:1px solid #ddd;aspect-ratio:2/3;overflow:hidden}

.day{position:absolute;left:6px;top:4px;font-size:14px;font-weight:bold}
.holiday{position:absolute;right:6px;top:4px;font-size:13px;color:#444}

.photoWrap{position:absolute;bottom:0;width:100%;height:66%;padding:4px;box-sizing:border-box}

.photoBorder{
width:100%;
height:100%;
padding:3px;
border-radius:6px;
box-shadow:0 6px 14px rgba(0,0,0,0.25);
}

.photoBorder img{
width:100%;
height:100%;
object-fit:cover;
border-radius:4px;
display:block;
}

.header{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:10px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.actions{display:flex;gap:6px}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:10}

.cropBox{background:#fff;padding:20px;border-radius:16px}

.cropArea{
position:relative;
width:300px;
height:300px;
overflow:hidden;
border-radius:10px;
background:#000;
margin-bottom:14px;
}

.cropHole{
position:absolute;
inset:0;
pointer-events:none;
border:4px solid white;
box-shadow:0 0 0 9999px rgba(0,0,0,0.55);
border-radius:10px;
}

.cropArea img{
position:absolute;
left:50%;
top:50%;
transform-origin:center;
user-select:none;
touch-action:none;
}

.makeBtn{
background:#000;
color:#fff;
border:none;
padding:10px 18px;
border-radius:10px;
font-size:15px;
}

.makeBtn:active{transform:scale(0.9)}

</style>
</head>
<body>

<div id="app"></div>

<script type="text/babel">

const {useState,useRef}=React

const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]

const months=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
]

const chinaFestivals={
"1-1":"元旦","2-14":"情人","3-8":"妇女","4-1":"愚人",
"5-1":"劳动","6-1":"儿童","10-1":"国庆","12-25":"圣诞",
"1-22":"春节","2-5":"元宵","4-4":"清明","6-22":"端午",
"8-22":"七夕","9-17":"中秋","10-23":"重阳"
}

const solarTerms={
"1-6":"小寒","1-20":"大寒",
"2-4":"立春","2-19":"雨水",
"3-6":"惊蛰","3-21":"春分",
"4-5":"清明","4-20":"谷雨",
"5-6":"立夏","5-21":"小满",
"6-6":"芒种","6-21":"夏至",
"7-7":"小暑","7-23":"大暑",
"8-8":"立秋","8-23":"处暑",
"9-8":"白露","9-23":"秋分",
"10-8":"寒露","10-23":"霜降",
"11-7":"立冬","11-22":"小雪",
"12-7":"大雪","12-22":"冬至"
}

function getHoliday(month,day){
const k=`${month+1}-${day}`
return chinaFestivals[k]||solarTerms[k]||null
}

function matrix(y,m){
const first=new Date(y,m,1).getDay()
const total=new Date(y,m+1,0).getDate()
const cells=[]
for(let i=0;i<first;i++)cells.push(null)
for(let d=1;d<=total;d++)cells.push(d)
while(cells.length%7)cells.push(null)

const weeks=[]
for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7))
return weeks
}

const stickerColors=["#ffd6e7","#d6f0ff","#fff4b5","#e2ffd6","#ffd6d6","#e6d6ff"]

function App(){

const today=new Date()

const [year,setYear]=useState(today.getFullYear())
const [month,setMonth]=useState(today.getMonth())

const [images,setImages]=useState({})

const [cropSrc,setCropSrc]=useState(null)
const [cropDay,setCropDay]=useState(null)

const [scale,setScale]=useState(1)
const [pos,setPos]=useState({x:0,y:0})

const dragRef=useRef(false)
const lastRef=useRef({x:0,y:0})

const imgRef=useRef()
const calendarRef=useRef()

function changeMonth(d){
let m=month+d
let y=year
if(m<0){m=11;y--}
if(m>11){m=0;y++}
setMonth(m);setYear(y)
}

function pick(day){
const input=document.createElement("input")
input.type="file"
input.accept="image/*"
input.onchange=e=>{
const file=e.target.files[0]
const r=new FileReader()

r.onload=ev=>{
setCropSrc(ev.target.result)
setCropDay(day)
setScale(1)
setPos({x:0,y:0})
}

r.readAsDataURL(file)
}

input.click()
}

function startDrag(e){
dragRef.current=true
lastRef.current={x:e.clientX||e.touches[0].clientX,y:e.clientY||e.touches[0].clientY}
}

function moveDrag(e){
if(!dragRef.current)return

const x=e.clientX||e.touches[0].clientX
const y=e.clientY||e.touches[0].clientY

const dx=x-lastRef.current.x
const dy=y-lastRef.current.y

lastRef.current={x,y}

setPos(p=>({x:p.x+dx,y:p.y+dy}))
}

function endDrag(){dragRef.current=false}

function makeIt(){
const canvas=document.createElement("canvas")
canvas.width=400
canvas.height=400

const ctx=canvas.getContext("2d")
const img=imgRef.current

const size=300

ctx.fillStyle="#000"
ctx.fillRect(0,0,400,400)

ctx.save()
ctx.translate(200+pos.x,200+pos.y)
ctx.scale(scale,scale)

ctx.drawImage(img,-img.naturalWidth/2,-img.naturalHeight/2)

ctx.restore()

const url=canvas.toDataURL()

const key=`${year}-${month}-${cropDay}`

setImages(prev=>({...prev,[key]:{
src:url,
color:stickerColors[Math.floor(Math.random()*stickerColors.length)]
}}))

setCropSrc(null)
}

function remove(k){
setImages(p=>{const c={...p};delete c[k];return c})
}

async function exportMonth(){
const canvas=await html2canvas(calendarRef.current,{scale:2})
const link=document.createElement("a")
link.download=`calendar-${year}-${month+1}.png`
link.href=canvas.toDataURL()
link.click()
}

const weeks=matrix(year,month)

return (
<div className="calendar" ref={calendarRef}>

<div className="topbar">
<div style={{fontWeight:"bold",fontSize:22}}>{year}</div>
<div className="actions">
<button onClick={exportMonth}>export</button>
</div>
</div>

<div className="header">
<button onClick={()=>changeMonth(-1)}>◀</button>
<div style={{fontSize:26,fontWeight:"bold"}}>{months[month]}</div>
<button onClick={()=>changeMonth(1)}>▶</button>
</div>

<div className="grid" style={{fontWeight:"bold",textAlign:"center",marginBottom:6}}>
{days.map(d=><div key={d}>{d}</div>)}
</div>

{weeks.map((week,i)=>(
<div className="grid" key={i}>

{week.map((d,j)=>{

if(!d)return <div key={j}></div>

const key=`${year}-${month}-${d}`
const img=images[key]
const holiday=getHoliday(month,d)

let color="#444"
if(holiday==="春节")color="#c93b3b"
if(holiday==="中秋")color="#c9a23b"

return (
<div className="cell" key={j} onClick={()=>!img&&pick(d)}>

<div className="day">{d}</div>

{holiday&&<div className="holiday" style={{color}}>{holiday}</div>}

{img&&(
<div className="photoWrap">
<div className="photoBorder" style={{background:img.color}} onClick={(e)=>{e.stopPropagation();remove(key)}}>
<img src={img.src}/>
</div>
</div>
)}

</div>
)

})}

</div>
))}

{cropSrc && (
<div className="modal" onMouseMove={moveDrag} onMouseUp={endDrag} onTouchMove={moveDrag} onTouchEnd={endDrag}>

<div className="cropBox">

<div className="cropArea">
<img
ref={imgRef}
src={cropSrc}
onLoad={(e)=>{
const img=e.target
const base=300/Math.min(img.naturalWidth,img.naturalHeight)
setScale(base)
}}
onMouseDown={startDrag}
onTouchStart={startDrag}
style={{
maxWidth:"none",
transform:`translate(-50%,-50%) translate(${pos.x}px,${pos.y}px) scale(${scale})`
}}
/>
<div className="cropHole"></div>
</div>

<div style={{display:"flex",gap:10,alignItems:"center"}}>
<label>zoom</label>
<input type="range" min="0.5" max="5" step="0.01" value={scale} onChange={e=>setScale(Number(e.target.value))} />
</div>

<br/>

<button className="makeBtn" onClick={makeIt}>make it</button>

</div>

</div>
)}

</div>
)
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />)

</script>
</body>
</html>
