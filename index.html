<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MONTHLY U_PLOG</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>

<style>
body{margin:0;background:#fafafa;font-family:system-ui,-apple-system}
.calendar{max-width:1100px;margin:auto;padding:16px}
.header{display:flex;justify-content:center;align-items:center;gap:14px;font-size:24px;font-weight:700;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cell{position:relative;border:1px solid #ddd;border-radius:12px;aspect-ratio:2/3;background:white;overflow:hidden;cursor:pointer}
.day{position:absolute;left:6px;top:4px;font-weight:700;font-size:16px}
.holiday{position:absolute;right:6px;top:4px;font-size:12px;color:#555}

.photoWrap{position:absolute;bottom:0;width:100%;height:66%;padding:4px}

.sticker{width:100%;height:100%;position:relative}

.tapeTop{position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:60%;height:14px;background:#f5e6a8;border-radius:4px;opacity:.85}

.polaroid{background:white;padding:6px 6px 16px 6px;border-radius:4px;box-shadow:0 6px 14px rgba(0,0,0,.25)}
.polaroid img{width:100%;height:100%;object-fit:cover}

.film{background:black;padding:4px;border-radius:6px}
.film img{width:100%;height:100%;object-fit:cover}

.torn{background:white;padding:4px;border-radius:8px;box-shadow:0 6px 14px rgba(0,0,0,.25)}
.torn:before{content:"";position:absolute;inset:-2px;background:repeating-linear-gradient(90deg,transparent,transparent 6px,#eee 7px)}

.photoBorder{width:100%;height:100%;transition:transform .25s,opacity .25s}
.photoBorder img{width:100%;height:100%;object-fit:cover;border-radius:4px}
.photoBorder.tear{transform:scale(.8) rotate(-10deg);opacity:0}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;justify-content:center;align-items:center}
.cropBox{background:white;padding:18px;border-radius:16px}

.cropArea{width:320px;height:320px;background:#111;position:relative;overflow:hidden;border-radius:14px;touch-action:none}
.cropArea img{position:absolute;left:50%;top:50%;transform-origin:center;user-select:none;pointer-events:none}

.cropFrame{position:absolute;inset:0;border:3px solid white;border-radius:12px;box-shadow:0 0 0 2000px rgba(0,0,0,.45) inset;pointer-events:none}

.buttons{display:flex;gap:10px;margin-top:10px}
button{padding:8px 14px;border:none;border-radius:8px;background:black;color:white;font-size:14px}
button.secondary{background:#888}

.controls{display:flex;justify-content:space-between;margin-bottom:8px}
</style>
</head>

<body>
<div id="app"></div>

<script type="text/babel">

const {useState,useRef,useEffect}=React

const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]
const months=["January","February","March","April","May","June","July","August","September","October","November","December"]

/* 公历节日 */
const solarFest={
"1-1":"元旦","2-14":"情人","3-8":"妇女","5-1":"劳动","6-1":"儿童","10-1":"国庆"
}

/* 二十四节气 */
const solarTerms={
"1-6":"小寒","1-20":"大寒","2-4":"立春","2-19":"雨水","3-6":"惊蛰","3-21":"春分",
"4-5":"清明","4-20":"谷雨","5-6":"立夏","5-21":"小满","6-6":"芒种","6-21":"夏至",
"7-7":"小暑","7-23":"大暑","8-8":"立秋","8-23":"处暑","9-8":"白露","9-23":"秋分",
"10-8":"寒露","10-23":"霜降","11-7":"立冬","11-22":"小雪","12-7":"大雪","12-22":"冬至"
}

/* 农历节日（真实农历算法） */
function getLunarFest(y,m,d){
const solar=Solar.fromYmd(y,m+1,d)
const lunar=solar.getLunar()
const md=`${lunar.getMonth()}-${lunar.getDay()}`

const table={
"1-1":"春节",
"1-15":"元宵",
"5-5":"端午",
"7-7":"七夕",
"8-15":"中秋",
"9-9":"重阳"
}

return table[md]||null
}

function getHoliday(y,m,d){
const lunarFest=getLunarFest(y,m,d)
if(lunarFest)return lunarFest

const key=`${m+1}-${d}`
if(solarFest[key])return solarFest[key]
if(solarTerms[key])return solarTerms[key]
return null
}

function matrix(y,m){
const first=new Date(y,m,1).getDay()
const total=new Date(y,m+1,0).getDate()
const cells=[]
for(let i=0;i<first;i++)cells.push(null)
for(let d=1;d<=total;d++)cells.push(d)
while(cells.length%7)cells.push(null)
const weeks=[]
for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7))
return weeks
}

const macaronColors=["#FFB3BA","#FFDFBA","#FFFFBA","#BAFFC9","#BAE1FF","#E3BAFF","#FFD6E7"]

function App(){

const today=new Date()

const [year,setYear]=useState(today.getFullYear())
const [month,setMonth]=useState(today.getMonth())

const [images,setImages]=useState(()=>{
const saved=localStorage.getItem("uplog_images")
return saved?JSON.parse(saved):{}
})

useEffect(()=>{
localStorage.setItem("uplog_images",JSON.stringify(images))
},[images])

const [cropSrc,setCropSrc]=useState(null)
const [cropDay,setCropDay]=useState(null)

const [scale,setScale]=useState(1)
const [pos,setPos]=useState({x:0,y:0})

const lastDist=useRef(null)
const dragStart=useRef(null)

const imgRef=useRef()
const calendarRef=useRef()

function pick(day){
const input=document.createElement("input")
input.type="file"
input.accept="image/*"
input.onchange=e=>{
const file=e.target.files[0]
if(!file)return
const reader=new FileReader()
reader.onload=ev=>{
setCropSrc(ev.target.result)
setCropDay(day)
setScale(1)
setPos({x:0,y:0})
}
reader.readAsDataURL(file)
}
input.click()
}

function touchStart(e){
if(e.touches.length===1){
dragStart.current={
x:e.touches[0].clientX-pos.x,
y:e.touches[0].clientY-pos.y
}
}
}

function touchMove(e){

if(e.touches.length===1 && dragStart.current){
setPos({
x:e.touches[0].clientX-dragStart.current.x,
y:e.touches[0].clientY-dragStart.current.y
})
}

if(e.touches.length===2){
const dx=e.touches[0].clientX-e.touches[1].clientX
const dy=e.touches[0].clientY-e.touches[1].clientY
const dist=Math.sqrt(dx*dx+dy*dy)

if(lastDist.current){
const delta=dist-lastDist.current
setScale(s=>Math.min(4,Math.max(.4,s+delta*0.003)))
}

lastDist.current=dist
}
}

function touchEnd(){
lastDist.current=null
}

function makeIt(){
if(!imgRef.current)return

const canvas=document.createElement("canvas")
canvas.width=600
canvas.height=600

const ctx=canvas.getContext("2d")
const img=imgRef.current

ctx.save()
ctx.translate(300+pos.x,300+pos.y)
ctx.scale(scale,scale)
ctx.drawImage(img,-img.naturalWidth/2,-img.naturalHeight/2)
ctx.restore()

const url=canvas.toDataURL()
const key=`${year}-${month}-${cropDay}`

setImages(prev=>({...prev,[key]:{
src:url,
color:macaronColors[Math.floor(Math.random()*macaronColors.length)]
}}))

setCropSrc(null)
}

function cancelCrop(){setCropSrc(null)}

function remove(k){
const el=document.getElementById(k)
if(el){
el.classList.add("tear")
setTimeout(()=>{
setImages(p=>{const c={...p};delete c[k];return c})
},250)
}
}

async function exportMonth(){
const canvas=await html2canvas(calendarRef.current,{scale:3})
const link=document.createElement("a")
link.download="u_plog.png"
link.href=canvas.toDataURL()
link.click()
}

async function exportYearPDF(){
const {jsPDF}=window.jspdf
const pdf=new jsPDF("p","mm","a4")

for(let m=0;m<12;m++){
setMonth(m)
await new Promise(r=>setTimeout(r,300))

const canvas=await html2canvas(calendarRef.current,{scale:2})
const img=canvas.toDataURL("image/png")

if(m>0)pdf.addPage()
pdf.addImage(img,"PNG",10,10,190,260)
}

pdf.save("u_plog_year.pdf")
}

function changeMonth(dir){
let m=month+dir
let y=year
if(m<0){m=11;y--}
if(m>11){m=0;y++}
setMonth(m)
setYear(y)
}

const weeks=matrix(year,month)

return (

<div className="calendar" ref={calendarRef}>

<div className="controls">
<div style={{fontWeight:"bold",fontSize:18}}>{year}</div>
<div>
<button onClick={()=>changeMonth(-1)}>◀</button>
<button onClick={()=>changeMonth(1)}>▶</button>
<button onClick={exportMonth}>export</button>
<button onClick={exportYearPDF}>year pdf</button>
</div>
</div>

<div className="header">
<span>{months[month]}</span>
</div>

<div className="grid" style={{fontWeight:600,marginBottom:6}}>
{days.map(d=><div key={d}>{d}</div>)}
</div>

{weeks.map((week,i)=> (
  <div className="grid" key={i}>
    {week.map((d,j)=>{
      if(!d) return <div key={j}></div>

      const key=`${year}-${month}-${d}`
      const img=images[key]
      const holiday=getHoliday(year,month,d)

      return (
        <div className="cell" key={j} onClick={()=>!img && pick(d)}>

          <div className="day">{d}</div>

          {holiday && <div className="holiday">{holiday}</div>}

          {img && (
            <div className="photoWrap">
              <div
                id={key}
                className="photoBorder"
                style={{border:`6px solid ${img.color}`,borderRadius:"10px"}}
                onClick={(e)=>{e.stopPropagation();remove(key)}}
              >
                <img src={img.src} />
              </div>
            </div>
          )}

        </div>
      )
    })}
  </div>
))}

{cropSrc&&(

<div className="modal">

<div className="cropBox">

<div
className="cropArea"
onTouchStart={touchStart}
onTouchMove={touchMove}
onTouchEnd={touchEnd}
>

<img
ref={imgRef}
src={cropSrc}
style={{transform:`translate(-50%,-50%) translate(${pos.x}px,${pos.y}px) scale(${scale})`}}
/>

<div className="cropFrame"></div>

</div>

<div style={{marginTop:10}}>
<input type="range" min="0.4" max="4" step="0.01" value={scale} onChange={e=>setScale(Number(e.target.value))}/>
</div>

<div className="buttons">
<button onClick={makeIt}>make it</button>
<button className="secondary" onClick={cancelCrop}>noo</button>
</div>

</div>

</div>

)}

</div>

)
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>)

/* simple tests */
console.assert(getHoliday(2026,1,17)==="春节")
console.assert(matrix(2026,0).length>=4)

</script>

</body>
</html>
